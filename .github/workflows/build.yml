name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Ninja + MSVC
      - uses: aseprite/get-ninja@main
      - uses: ilammy/msvc-dev-cmd@v1

      # Install dependencies (Skia from official script like new build)
      - name: Install Skia
        shell: bash
        run: |
          skia_url=$(bash laf/misc/skia-url.sh)
          curl -L -o skia.zip "$skia_url"
          unzip skia.zip -d skia

      # Configure
      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=$(realpath skia) ^
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-x64) ^
            -DENABLE_TESTS=OFF ^
            -DENABLE_CCACHE=OFF

      # Build
      - name: Build
        shell: bash
        run: |
          cd build && ninja aseprite

      # Upload artifact (THIS is what your old fork lacked properly)
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows
          path: |
            build/bin/aseprite.exe
            build/bin/data
