name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # ---------------- checkout ----------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ---------------- hard reset repo state (IMPORTANT FIX) ----------------
      - name: Fix submodules (critical for third_party errors)
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force
          git clean -xfd

      # ---------------- tools ----------------
      - name: Setup Ninja
        uses: aseprite/get-ninja@main

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ---------------- Skia (official script) ----------------
      - name: Download Skia
        shell: bash
        run: |
          skia_url=$(bash laf/misc/skia-url.sh)
          echo "Skia: $skia_url"
          curl -L -o skia.zip "$skia_url"
          unzip -q skia.zip -d skia

      # ---------------- configure ----------------
      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DLAF_BACKEND=skia ^
            -DENABLE_TESTS=OFF ^
            -DENABLE_CCACHE=OFF ^
            -DSKIA_DIR=$(realpath skia) ^
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-x64)

      # ---------------- build ----------------
      - name: Build
        shell: bash
        run: |
          cmake --build build -- -j 4

      # ---------------- debug safety ----------------
      - name: Check output
        shell: bash
        run: |
          echo "=== build/bin ==="
          ls build/bin || echo "missing build/bin"

      # ---------------- artifact ----------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows
          path: |
            build/bin/aseprite.exe
            build/bin/data
